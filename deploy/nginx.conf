# ─────────────────────────────────────────────────────────────────────────────
# nginx reverse proxy for Mil API
#
# 1. Replace YOUR_DOMAIN with your actual domain (or Droplet IP for testing)
# 2. After DNS points to Droplet, get SSL:
#       certbot --nginx -d YOUR_DOMAIN
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect HTTP → HTTPS once certbot is set up
    # certbot will add the redirect block automatically

    # Max upload size (profile photos, etc.)
    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Health check endpoint — does not hit uvicorn
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
